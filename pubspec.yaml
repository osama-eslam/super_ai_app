name: ai_super_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  shared_preferences: ^2.5.3
  dio: ^5.9.0
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.2.0
  flutter_tts: ^4.2.3
  speech_to_text: ^7.3.0
  dropdown_search: ^6.0.2
  gal: ^2.3.0
  permission_handler: ^11.3.0
  http: ^1.5.0
  file_picker: ^10.3.3
  pdfx: ^2.9.2
